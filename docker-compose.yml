services:
  escap-mcp:
    image: escap-mcp:latest
    container_name: escap-mcp
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      MCP_TRANSPORT: http
      PORT: 9000
      # Apache uses: ProxyPass /mcp/ http://localhost:9000/
      # Trailing slash = Apache strips /mcp before forwarding.
      # Container receives /message and /health — leave PATH_PREFIX empty.
      PATH_PREFIX: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
